name: "AI Code Review Action"
description: "Perform code reviews and comment on diffs using OpenAI or Google Gemini API."
inputs:
  GITHUB_TOKEN:
    description: "GitHub token to interact with the repository."
    required: true
  OPENAI_API_KEY:
    description: "OpenAI API key for GPT. Either OPENAI_API_KEY or GEMINI_API_KEY must be set."
    required: false
  OPENAI_API_MODEL:
    description: "OpenAI API model (used when OPENAI_API_KEY is set)."
    required: false
    default: "gpt-4"
  GEMINI_API_KEY:
    description: "Google Gemini API key. Either OPENAI_API_KEY or GEMINI_API_KEY must be set."
    required: false
  GEMINI_MODEL:
    description: "Gemini model name (used when GEMINI_API_KEY is set)."
    required: false
    default: "gemini-2.5-flash"
  exclude:
    description: "Glob patterns to exclude files from the diff analysis"
    required: false
    default: ""
runs:
  using: "node16"
  main: "dist/index.js"
branding:
  icon: "aperture"
  color: "green"
